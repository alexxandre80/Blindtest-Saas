services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env.prod
    environment:
      NODE_ENV: production
    restart: always
    depends_on:
      - db

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    restart: always
    depends_on:
      - server

volumes:
  pg_data:
